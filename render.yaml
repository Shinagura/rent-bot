services:
  - type: web
    name: rent-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web_app:app -b 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
    disk:
      name: app-data
      mountPath: /var/data